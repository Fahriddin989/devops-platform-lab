apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-configmap-reader-test
  namespace: devops-lab
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-configmap-reader-test
  namespace: devops-lab
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: devops-lab
roleRef:
  kind: Role
  name: backend-configmap-reader-test
  apiGroup: rbac.authorization.k8s.io
