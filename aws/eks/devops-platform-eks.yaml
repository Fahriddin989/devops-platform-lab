apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: devops-platform-eks
  region: eu-central-1
  version: "1.35"

availabilityZones:
  - eu-central-1a
  - eu-central-1b

iam:
  withOIDC: true

vpc:
  nat:
    gateway: Disable
  clusterEndpoints:
    publicAccess: true
    privateAccess: false

managedNodeGroups:
  - name: ng-public-c7i-flex-large
    instanceType: c7i-flex.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 2
    volumeSize: 30
    privateNetworking: false
    ssh:
      allow: false
    labels:
      role: worker
      environment: lab
    tags:
      project: devops-platform-lab
      phase: phase-5b-service-mesh
      owner: fahri
