apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.156.0
    helm:
      releaseName: otel-collector
      values: |
        mode: deployment

        fullnameOverride: otel-collector

        image:
          repository: otel/opentelemetry-collector-k8s

        replicaCount: 1

        service:
          type: ClusterIP

        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
            appProtocol: grpc

          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP

          jaeger-compact:
            enabled: false

          jaeger-thrift:
            enabled: false

          jaeger-grpc:
            enabled: false

          zipkin:
            enabled: false

          metrics:
            enabled: false

        alternateConfig:
          extensions:
            health_check:
              endpoint: ${env:MY_POD_IP}:13133

          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25

            batch: {}

          exporters:
            debug:
              verbosity: basic

          service:
            extensions:
              - health_check

            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - batch
                exporters:
                  - debug

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: tracing

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
