apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Fahriddin989/devops-platform-lab.git
    targetRevision: master
    path: charts/devops-platform
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lab

  syncPolicy:
    automated:
      selfHeal: true
      prune: false 
