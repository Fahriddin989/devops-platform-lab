{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.service.name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "devops-platform.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  annotations:
    config.linkerd.io/opaque-ports: "5432"
spec:
  type: {{ .Values.postgres.service.type }}

  selector:
    app: {{ .Values.postgres.labels.app }}

  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.targetPort }}
      protocol: TCP
{{- end }}
