{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "devops-platform.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.backend.strategy.maxUnavailable }}
      maxSurge: {{ .Values.backend.strategy.maxSurge }}

  selector:
    matchLabels:
      app: {{ .Values.backend.labels.app }}

  template:
    metadata:
      labels:
        app: {{ .Values.backend.labels.app }}
      annotations:
        config-version: {{ .Values.backend.rollout.configVersion | quote }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.backend.container.port | quote }}

    spec:
      serviceAccountName: {{ .Values.backend.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.backend.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}

      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}

          securityContext:
            runAsNonRoot: {{ .Values.backend.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.backend.securityContext.runAsUser }}
            runAsGroup: {{ .Values.backend.securityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ .Values.backend.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.backend.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                - ALL

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.backend.lifecycle.preStopSleepSeconds }}

          ports:
            - containerPort: {{ .Values.backend.container.port }}

          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: {{ .Values.backend.container.port }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: {{ .Values.backend.container.port }}
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.liveness.failureThreshold }}

          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu | quote }}
              memory: {{ .Values.backend.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu | quote }}
              memory: {{ .Values.backend.resources.limits.memory | quote }}

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: REDIS_PORT

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secret.name }}
                  key: {{ .Values.backend.secret.dbUserKey }}

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secret.name }}
                  key: {{ .Values.backend.secret.dbPasswordKey }}

            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.backend.config.name }}
                  key: APP_ENV

      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
